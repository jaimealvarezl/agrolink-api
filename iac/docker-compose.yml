services:
  api:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: agrolink-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=agrolinkdb;Username=agrolinkadmin;Password=agrolinkpassword
      - Firebase__ProjectId=${FIREBASE_PROJECT_ID:-your-firebase-project-id}
      - GCS__BucketName=agrolink-files
      - STORAGE_EMULATOR_HOST=http://gcs-emulator:4443
      - Telegram__BotToken=${TELEGRAM_BOT_TOKEN:-}
      - Telegram__WebhookSecretToken=${TELEGRAM_WEBHOOK_SECRET:-}
      - OpenAI__ApiKey=${OPENAI_API_KEY:-}
    ports:
      - "5001:8080"
    depends_on:
      postgres:
        condition: service_healthy
      gcs-emulator:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: agrolink-postgres
    environment:
      POSTGRES_DB: agrolinkdb
      POSTGRES_USER: agrolinkadmin
      POSTGRES_PASSWORD: agrolinkpassword
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  pgadmin:
    image: elestio/pgadmin:latest
    container_name: agrolink-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin1234
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  gcs-emulator:
    image: fsouza/fake-gcs-server:latest
    container_name: agrolink-gcs
    command: -scheme http -port 4443 -backend memory -public-host gcs-emulator:4443
    ports:
      - "4443:4443"
    volumes:
      - gcs_data:/data

  gcs-setup:
    image: curlimages/curl:latest
    container_name: agrolink-gcs-setup
    depends_on:
      - gcs-emulator
    entrypoint: ["/bin/sh", "-c"]
    command: |
      sleep 2 && \
      curl -X POST "http://gcs-emulator:4443/storage/v1/b" \
        -H "Content-Type: application/json" \
        -d '{"name":"agrolink-files"}' && \
      echo "GCS bucket created"

volumes:
  pg_data:
  gcs_data:
