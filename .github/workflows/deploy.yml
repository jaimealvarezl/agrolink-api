name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  GCP_REGION: 'us-central1'
  IMAGE_NAME: 'agrolink-api'

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.sln') }}
          restore-keys: ${{ runner.os }}-nuget-

      - run: dotnet restore
      - run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: |
          dotnet test \
            --configuration Release \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            **/TestResults/**/*.trx
            **/TestResults/**/coverage.cobertura.xml
          retention-days: 7

      - uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/*test-results.trx'
          check_name: 'Test Results'
          comment_mode: always

      - uses: codecov/codecov-action@v4
        if: always()
        with:
          files: '**/coverage.cobertura.xml'
          fail_ci_if_error: false

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: production
    permissions:
      contents: read
      id-token: write  # for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.sln') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set image tag
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          REPO="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/agrolink/${{ env.IMAGE_NAME }}"
          echo "IMAGE_TAG=${REPO}:${SHORT_SHA}" >> $GITHUB_ENV
          echo "IMAGE_LATEST=${REPO}:latest" >> $GITHUB_ENV

      - name: Build and push Docker image
        run: |
          docker build -t "$IMAGE_TAG" -t "$IMAGE_LATEST" .
          docker push "$IMAGE_TAG"
          docker push "$IMAGE_LATEST"

      - name: Run database migrations
        run: |
          echo "Running EF Core migrations..."
          dotnet tool restore
          dotnet restore -r linux-x64

          cd src/AgroLink.Infrastructure
          dotnet ef migrations bundle \
            --startup-project ../AgroLink.Api/AgroLink.Api.csproj \
            --configuration Release \
            --output /tmp/migrations-bundle \
            --self-contained \
            --runtime linux-x64

          echo "Uploading migration bundle..."
          BUNDLE_KEY="migrations/migrations-${GITHUB_SHA:0:7}.tar.gz"
          tar -czf /tmp/bundle.tar.gz -C /tmp migrations-bundle
          gcloud storage cp /tmp/bundle.tar.gz \
            "gs://${{ secrets.GCP_PROJECT_ID }}-agrolink-migrations/${BUNDLE_KEY}"

          echo "Running migrations via Cloud Run Job..."
          gcloud run jobs create "agrolink-migrate-${GITHUB_SHA:0:7}" \
            --image "$IMAGE_TAG" \
            --region "${{ env.GCP_REGION }}" \
            --service-account "${{ secrets.GCP_SERVICE_ACCOUNT }}" \
            --set-cloudsql-instances "${{ secrets.CLOUD_SQL_CONNECTION_NAME }}" \
            --set-env-vars "ConnectionStrings__DefaultConnection=${{ secrets.DB_CONNECTION_STRING }}" \
            --command "/app/migrations-bundle" \
            --max-retries 1 \
            --task-timeout 300s \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            || true

          gcloud run jobs execute "agrolink-migrate-${GITHUB_SHA:0:7}" \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --wait

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy agrolink-api \
            --image "$IMAGE_TAG" \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --platform managed \
            --no-traffic \
            --tag "sha-${GITHUB_SHA:0:7}"

          echo "Shifting traffic to new revision..."
          gcloud run services update-traffic agrolink-api \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --to-latest

          echo "Deploy complete: $IMAGE_TAG"
